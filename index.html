<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Tarifas • Creadores Latam & Brasil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-2xl mx-auto py-12 px-6">

    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">Calculadora de Tarifas</h1>
      <p id="subtitle" class="text-zinc-400 mt-2 text-lg">Calculadora realista para creadores de Latam y Brasil</p>
    </div>

    <div class="flex justify-end mb-8">
      <select id="language-select" onchange="changeLanguage()" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-2 text-sm">
        <option value="es">Español</option>
        <option value="pt">Português</option>
      </select>
    </div>

    <!-- Formulario (mismo que antes) -->
    <div class="bg-zinc-900 rounded-3xl p-8">
      <div class="space-y-6">
        <div>
          <label id="label-nicho" class="block text-sm text-zinc-400 mb-2">Tipo de contenido / Nicho</label>
          <select id="nicho" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg"></select>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label id="label-plataforma" class="block text-sm text-zinc-400 mb-2">Plataforma principal</label>
            <select id="plataforma" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg"></select>
          </div>
          <div>
            <label id="label-seguidores" class="block text-sm text-zinc-400 mb-2">Seguidores aproximados</label>
            <input id="seguidores" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg" placeholder="Ej: 50.000">
          </div>
        </div>
        <button onclick="calcularTarifa()" class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 py-5 rounded-2xl font-semibold text-xl">Calcular mi tarifa</button>
      </div>
    </div>

    <!-- Resultado -->
    <div id="resultado" class="hidden mt-8 bg-zinc-900 rounded-3xl p-8 text-center">
      <p id="resultado-texto" class="text-3xl font-bold"></p>
      <p id="resultado-sub" class="text-emerald-400 mt-2"></p>

      <div class="flex justify-center gap-4 mt-10">
        <button onclick="compartirInstagram()" class="flex items-center gap-3 bg-gradient-to-r from-pink-500 to-purple-500 px-8 py-4 rounded-2xl font-semibold"><i class="fa-brands fa-instagram"></i> Compartir en Instagram</button>
        <button onclick="compartirWhatsApp()" class="flex items-center gap-3 bg-green-500 px-8 py-4 rounded-2xl font-semibold"><i class="fa-brands fa-whatsapp"></i> Compartir por WhatsApp</button>
      </div>

      <button onclick="guardarResultado()" class="mt-6 text-zinc-400 hover:text-white flex items-center gap-2 mx-auto">
        <i class="fa-solid fa-download"></i> Guardar resultado como imagen
      </button>

      <!-- CTA a la Landing -->
      <div class="mt-12 bg-gradient-to-r from-violet-900/30 to-fuchsia-900/30 border border-violet-400/30 rounded-3xl p-8">
        <p class="text-xl font-medium">¿Querés manejar todos tus brand deals de forma profesional?</p>
        <a href="https://creatordash-landing.vercel.app" target="_blank" 
           class="mt-6 block w-full bg-white text-zinc-900 py-5 rounded-2xl font-semibold text-xl hover:scale-105 transition">
          Probar CreatorDash GRATIS 14 días →
        </a>
      </div>
    </div>
  </div>

  <script>
    // (El resto del script es el mismo que te pasé antes, solo con el CTA corregido)
    let currentLang = 'es';
    const translations = { /* ... mismo translations que antes ... */ };
    // ... (populateSelects, changeLanguage, calcularTarifa, etc. igual que la última versión)

    window.onload = () => changeLanguage();
  </script>
</body>
</html>
